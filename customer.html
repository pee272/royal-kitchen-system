<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap');
        :root { --gold: #c5a059; --glass: rgba(0, 0, 0, 0.95); --border: rgba(255, 255, 255, 0.1); }
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Poppins', sans-serif; color: #fff; background: #000; overflow-x: hidden; }
        .view { position: fixed; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; background: #000; z-index: 500; }
        #choice-view { display: flex; z-index: 1000; }
        .choice-card { background: rgba(255,255,255,0.03); border: 1px solid var(--border); padding: 30px; border-radius: 35px; width: 80%; max-width: 400px; margin-bottom: 20px; text-align: center;}
        #menu-view { display: none; padding: 20px; min-height: 100vh; background: #050505; position: relative; z-index: 600; padding-top: 60px; }
        .dish-card { background: var(--glass); border: 1px solid var(--border); margin-bottom: 15px; padding: 18px; border-radius: 28px; display: flex; align-items: center; cursor: pointer; }
        .dish-img { width: 70px; height: 70px; border-radius: 15px; margin-right: 15px; object-fit: cover; border: 1px solid var(--gold); }
        .modal-box { width: 85%; max-width: 400px; background: #111; padding: 30px 20px; border-radius: 40px; border: 1px solid var(--gold); text-align: center; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); display: none; z-index: 2000; }
        .qty-btn { background: none; border: 1px solid var(--gold); color: var(--gold); width: 35px; height: 35px; border-radius: 50%; cursor: pointer; }
        .cart-bar { position: fixed; bottom: 20px; left: 15px; right: 15px; background: var(--gold); color: #000; padding: 15px; border-radius: 25px; display: none; flex-direction: column; align-items: center; font-weight: 800; z-index: 1500; gap: 10px; }
        
        #face-sec-view { z-index: 4000; background: #000; text-align: center; display: none; flex-direction: column; align-items: center; justify-content: center; }
        #camera-feed { width: 250px; height: 250px; border-radius: 50%; object-fit: cover; border: 4px solid var(--gold); margin-bottom: 20px; transform: scaleX(-1); }
        #success-view { z-index: 5000; background: #000; text-align: center; display: none; }
        
        .tablet-hide-controls .qty-btn, .tablet-hide-controls #add-btn, .tablet-hide-controls .btn-row button { display: none !important; }
        .btn-row { display: flex; width: 100%; gap: 10px; justify-content: center; }
        .modal-active #choice-view { display: none !important; }
    </style>
</head>
<body id="main-body">

    <div id="success-view" class="view">
        <h1 style="color:var(--gold); font-size: 4rem;">✓</h1>
        <h2>Payment Successful!</h2>
    </div>

    <div id="face-sec-view" class="view">
        <h2 style="color:var(--gold);">Face Verification</h2>
        <video id="camera-feed" autoplay playsinline></video>
        <canvas id="photo-canvas" style="display:none;"></canvas>
        <button onclick="captureAndSend()" style="background:var(--gold); color:#000; padding:15px 40px; border-radius:50px; border:none; font-weight:800;">CONFIRM ORDER</button>
    </div>

    <div id="choice-view" class="view">
        <h2 style="color:var(--gold);">THE ROYAL KITCHEN</h2>
        <div class="choice-card"><img id="qr-img" src="" style="width: 150px; border: 5px solid #fff; border-radius: 10px;"></div>
        <div class="choice-card" onclick="startFlow()" style="border: 1.5px solid var(--gold); cursor:pointer;"><h3>Manual Tablet Menu</h3></div>
    </div>

    <div id="menu-view">
        <h2 style="font-weight: 800;">Our Menu</h2>
        <div class="dish-card" onclick="triggerItem('Paneer Tikka', 180, 320)">
            <img src="https://images.unsplash.com/photo-1567188040759-fb8a883dc6d8?w=200" class="dish-img">
            <div><h3>Paneer Tikka</h3><small style="color:var(--gold)">H: 180 | F: 320</small></div>
        </div>
    </div>

    <div id="item-modal" class="modal-box">
        <h2 id="modal-item-name" style="color:var(--gold);">Item</h2>
        <div style="display:flex; justify-content:space-around; margin: 20px 0;">
             <div>Half <br><button class="qty-btn" onclick="triggerQty('half', -1)">-</button> <span id="hc">0</span> <button class="qty-btn" onclick="triggerQty('half', 1)">+</button></div>
             <div>Full <br><button class="qty-btn" onclick="triggerQty('full', -1)">-</button> <span id="fc">0</span> <button class="qty-btn" onclick="triggerQty('full', 1)">+</button></div>
        </div>
        <button id="add-btn" onclick="triggerAdd()" style="width:100%; background:var(--gold); padding:15px; border-radius:15px; border:none; font-weight:800;">ADD TO CART</button>
        <p onclick="triggerClose()" style="margin-top:10px; opacity:0.5; cursor:pointer;">Cancel</p>
    </div>

    <div class="cart-bar" id="cart-bar">
        <span>Total Bill: ₹<span id="tb">0</span></span>
        <div class="btn-row">
            <button id="main-send-btn" onclick="startSecurity()" style="background:#000; color:#fff; border:none; padding:12px; border-radius:12px; width:100%;">SEND ORDER</button>
            <button id="add-more-btn" onclick="setOrderState(false)" style="display:none; background:#fff; color:#000; border:none; padding:10px; border-radius:12px; flex:1;">+ ADD MORE</button>
            <button id="pay-btn" onclick="handlePayment()" style="display:none; background:#000; color:#fff; border:none; padding:10px; border-radius:12px; flex:1;">PAY NOW</button>
        </div>
    </div>

    <script>
        const CLOUD_URL = "https://royal-kitchen.onrender.com"; 
        const TABLE_ID = "01"; 
        const socket = io(CLOUD_URL);
        let isMobile = false, totalBill = 0, currentItem = {}, counts = {half:0, full:0};

        socket.emit('join_table', TABLE_ID);
        document.getElementById('qr-img').src = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${window.location.href.split('?')[0]}?table=${TABLE_ID}`;

        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            const savedBill = localStorage.getItem('bill_' + TABLE_ID);
            const orderSent = localStorage.getItem('sent_' + TABLE_ID);

            if(savedBill) { 
                totalBill = parseInt(savedBill); 
                updateUIAfterCart();
                if(orderSent === "true") setOrderState(true);
            }

            if (params.has('table')) {
                isMobile = true; 
                startFlow();
            } else {
                document.getElementById('main-body').classList.add('tablet-hide-controls');
            }
        };

        function setOrderState(placed) {
            localStorage.setItem('sent_' + TABLE_ID, placed);
            document.getElementById('main-send-btn').style.display = placed ? 'none' : 'block';
            document.getElementById('add-more-btn').style.display = placed ? 'block' : 'none';
            document.getElementById('pay-btn').style.display = placed ? 'block' : 'none';
        }

        async function startSecurity() {
            if(!isMobile) return;
            document.getElementById('face-sec-view').style.display = 'flex';
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                document.getElementById('camera-feed').srcObject = stream;
            } catch (e) { alert("Camera Permission Required!"); }
        }

        function captureAndSend() {
            const video = document.getElementById('camera-feed');
            const canvas = document.getElementById('photo-canvas');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            socket.emit('new_order', { table: TABLE_ID, total: totalBill, proof: canvas.toDataURL('image/jpeg', 0.5) });
            video.srcObject.getTracks().forEach(t => t.stop());
            document.getElementById('face-sec-view').style.display = 'none';
            setOrderState(true);
        }

        function handlePayment() {
            if(!confirm("Pay ₹" + totalBill + "?")) return;
            localStorage.clear();
            socket.emit('sync_action', { table: TABLE_ID, type: 'paid' });
            document.getElementById('menu-view').style.display = 'none';
            document.getElementById('cart-bar').style.display = 'none';
            document.getElementById('success-view').style.display = 'flex';
            setTimeout(() => { location.href = window.location.href.split('?')[0]; }, 3000);
        }

        function startFlow() { document.getElementById('choice-view').style.display = 'none'; document.getElementById('menu-view').style.display = 'block'; }
        function triggerItem(n, h, f) { if(!isMobile) return; socket.emit('sync_action', { table: TABLE_ID, type: 'open', data: {n, h, f} }); openItem(n, h, f); }
        function openItem(n, hp, fp) {
            currentItem = {n, hp, fp}; counts = {half:0, full:0};
            document.getElementById('modal-item-name').innerText = n;
            document.getElementById('hc').innerText = 0; document.getElementById('fc').innerText = 0;
            document.getElementById('main-body').classList.add('modal-active');
            document.getElementById('item-modal').style.display = 'block';
        }
        function triggerQty(t, v) { if(!isMobile) return; socket.emit('sync_action', { table: TABLE_ID, type: 'qty', data: {t, v} }); updateQty(t, v); }
        function updateQty(t, v) { counts[t] = Math.max(0, counts[t]+v); document.getElementById(t==='half'?'hc':'fc').innerText = counts[t]; }
        function triggerAdd() { if(!isMobile) return; socket.emit('sync_action', { table: TABLE_ID, type: 'add' }); addToCart(); }
        function addToCart() {
            totalBill += (counts.half*currentItem.hp) + (counts.full*currentItem.fp);
            localStorage.setItem('bill_' + TABLE_ID, totalBill);
            updateUIAfterCart();
            closeModal();
        }
        function triggerClose() { if(!isMobile) return; socket.emit('sync_action', { table: TABLE_ID, type: 'close' }); closeModal(); }
        function closeModal() { document.getElementById('main-body').classList.remove('modal-active'); document.getElementById('item-modal').style.display = 'none'; }
        function updateUIAfterCart() { document.getElementById('tb').innerText = totalBill; document.getElementById('cart-bar').style.display = 'flex'; }

        socket.on('sync_action', (p) => {
            if(p.table !== TABLE_ID) return;
            if(p.type === 'open') openItem(p.data.n, p.data.h, p.data.f);
            if(p.type === 'qty') updateQty(p.data.t, p.data.v);
            if(p.type === 'add') addToCart();
            if(p.type === 'close') closeModal();
            if(p.type === 'paid') location.reload();
        });
    </script>
</body>
</html>
