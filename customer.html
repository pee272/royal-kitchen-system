<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap');
        :root { --gold: #c5a059; --glass: rgba(0, 0, 0, 0.95); --border: rgba(255, 255, 255, 0.1); }
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Poppins', sans-serif; color: #fff; background: #000; overflow-x: hidden; }
        .view { position: fixed; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; background: #000; z-index: 500; text-align: center; }
        #menu-view { display: none; padding: 20px; min-height: 100vh; background: #050505; position: relative; z-index: 600; padding-top: 60px; }
        .dish-card { background: var(--glass); border: 1px solid var(--border); margin-bottom: 15px; padding: 18px; border-radius: 28px; display: flex; align-items: center; cursor: pointer; text-align: left; }
        .dish-card.locked { opacity: 0.5; cursor: not-allowed; }
        .dish-img { width: 70px; height: 70px; border-radius: 15px; margin-right: 15px; object-fit: cover; border: 1px solid var(--gold); }
        .modal-box { width: 85%; max-width: 400px; background: #111; padding: 30px 20px; border-radius: 40px; border: 1px solid var(--gold); text-align: center; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); display: none; z-index: 2000; }
        .qty-btn { background: none; border: 1px solid var(--gold); color: var(--gold); width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-weight: bold; }
        .cart-bar { position: fixed; bottom: 20px; left: 15px; right: 15px; background: var(--gold); color: #000; padding: 15px; border-radius: 25px; display: none; flex-direction: column; align-items: center; font-weight: 800; z-index: 1500; }
        .btn-group { display: flex; gap: 8px; width: 100%; margin-top: 10px; }
        .action-btn { flex: 1; padding: 12px 5px; border-radius: 12px; border: none; font-weight: bold; font-size: 0.75rem; }
        #receipt-view { z-index: 6000; background: rgba(0,0,0,0.9); display: none; overflow-y: auto; padding: 20px 0; }
        .receipt-card { background: #fff; color: #000; width: 85%; border-radius: 20px; padding: 20px; text-align: left; margin: auto; }
        #face-sec-view { z-index: 3000; background: #000; }
        .history-box { border-bottom: 1px dashed #000; margin-bottom: 10px; padding-bottom: 5px; }
    </style>
</head>
<body>

    <div id="choice-view" class="view" style="display: flex;">
        <h2 style="color:var(--gold);">THE ROYAL KITCHEN</h2>
        <img id="qr-img" src="" style="width: 150px; border: 5px solid #fff; border-radius: 10px;">
        <p style="margin-top:20px; opacity:0.6;">Scan to connect Table 01</p>
    </div>

    <div id="menu-view">
        <h2 style="font-weight: 800;">Our Menu</h2>
        <div class="dish-card" onclick="triggerItem('Paneer Tikka', 180, 320)">
            <img src="https://images.unsplash.com/photo-1567188040759-fb8a883dc6d8?w=200" class="dish-img">
            <div><h3>Paneer Tikka</h3><small style="color:var(--gold)">H: 180 | F: 320</small></div>
        </div>
    </div>

    <div id="item-modal" class="modal-box">
        <h2 id="modal-item-name" style="color:var(--gold);">Item</h2>
        <div style="display:flex; justify-content:space-around; margin: 20px 0;">
             <div>Half <br><br> <button class="qty-btn" onclick="triggerQty('half', -1)">-</button> <span id="hc" style="font-size:1.2rem; margin:0 10px;">0</span> <button class="qty-btn" onclick="triggerQty('half', 1)">+</button></div>
             <div>Full <br><br> <button class="qty-btn" onclick="triggerQty('full', -1)">-</button> <span id="fc" style="font-size:1.2rem; margin:0 10px;">0</span> <button class="qty-btn" onclick="triggerQty('full', 1)">+</button></div>
        </div>
        <h3>Item Total: ₹<span id="mt">0</span></h3>
        <button id="add-btn" onclick="triggerAdd()" style="width:100%; background:var(--gold); padding:15px; border-radius:15px; border:none; font-weight:800;">ADD TO CART</button>
    </div>

    <div id="receipt-view" class="view">
        <div class="receipt-card">
            <h3 style="text-align:center; border-bottom: 2px dashed #ccc;">ORDER HISTORY</h3>
            <div id="rec-history-container"></div>
            <h2 style="text-align: right; border-top: 2px solid #000;">Total: ₹<span id="rec-total">0</span></h2>
            <button onclick="document.getElementById('receipt-view').style.display='none'" style="width:100%; margin-top:15px; background:#000; color:#fff; border:none; padding:10px; border-radius:10px;">CLOSE</button>
        </div>
    </div>

    <div id="thank-you-view" class="view">
        <h1 style="color:var(--gold); font-size: 4rem;">🙏</h1>
        <h2>PAID & CLEARED</h2>
    </div>

    <div class="cart-bar" id="cart-bar">
        <span>Total Bill: ₹<span id="tb">0</span></span>
        <div id="initial-btns" class="btn-group">
            <button class="action-btn" onclick="startSecurity()" style="background:#000; color:#fff; width:100%;">SEND ORDER</button>
        </div>
        <div id="post-order-btns" class="btn-group" style="display:none;">
            <button class="action-btn" onclick="unlockMenuForNew()" style="background:#fff; color:#000;">+ ADD MORE</button>
            <button class="action-btn" onclick="showReceipt()" style="background:var(--gold); color:#000;">VIEW RECEIPT</button>
            <button class="action-btn" onclick="handlePayment()" style="background:#000; color:#fff;">PAY NOW</button>
        </div>
    </div>

    <div id="face-sec-view" class="view">
        <video id="camera-feed" autoplay playsinline style="width:250px; height:250px; border-radius:50%; object-fit:cover; border:4px solid var(--gold);"></video>
        <canvas id="photo-canvas" style="display:none;"></canvas>
        <button onclick="captureAndSend()" style="background:var(--gold); color:#000; padding:15px 40px; border-radius:50px; border:none; font-weight:800; margin-top:20px;">CONFIRM</button>
    </div>

    <script>
        const CLOUD_URL = "https://royal-kitchen.onrender.com"; 
        const TABLE_ID = "01"; 
        const socket = io(CLOUD_URL);
        let isMobile = false, totalBill = 0, currentItem = {}, counts = {half:0, full:0}, hasOrdered = false, isPaid = false, isMenuLocked = false;
        let pendingCart = {}, confirmedOrders = []; // confirmedOrders mein history rahegi

        const myUrl = window.location.href.split('?')[0];
        document.getElementById('qr-img').src = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${myUrl}?table=${TABLE_ID}`;

        socket.on('connect', () => {
            socket.emit('join_table', TABLE_ID);
            loadState();
            const params = new URLSearchParams(window.location.search);
            if (params.has('table')) {
                isMobile = true;
                showMenuView();
            }
        });

        function unlockMenuForNew() {
            isMenuLocked = false;
            pendingCart = {}; // NAYA: Pending cart khali kar di taaki menu fresh dikhe
            document.querySelectorAll('.dish-card').forEach(card => card.classList.remove('locked'));
            document.getElementById('item-modal').style.display = 'none';
        }

        function triggerItem(n, h, f) {
            if(!isMobile || isMenuLocked) return;
            currentItem = {n, h, f};
            counts = {half:0, full:0}; // Hamesha zero dikhayega naye order ke liye
            document.getElementById('modal-item-name').innerText = n;
            document.getElementById('hc').innerText = 0; document.getElementById('fc').innerText = 0;
            document.getElementById('mt').innerText = 0;
            document.getElementById('item-modal').style.display = 'block';
        }

        function updateQty(t, v) {
            counts[t] = Math.max(0, counts[t]+v);
            document.getElementById(t==='half'?'hc':'fc').innerText = counts[t];
            document.getElementById('mt').innerText = (counts.half * currentItem.h) + (counts.full * currentItem.f);
        }
        function triggerQty(t, v) { if(isMobile) updateQty(t, v); }

        function triggerAdd() {
            if(isMobile) {
                pendingCart[currentItem.n] = {...counts};
                updateDisplayBill();
                document.getElementById('item-modal').style.display = 'none';
                document.getElementById('cart-bar').style.display = 'flex';
                document.getElementById('initial-btns').style.display = 'flex';
                document.getElementById('post-order-btns').style.display = 'none';
                saveState();
            }
        }

        function updateDisplayBill() {
            let pendingTotal = Object.values(pendingCart).reduce((acc, i) => acc + (i.half * 180) + (i.full * 320), 0); // Demo rates
            let confirmedTotal = confirmedOrders.reduce((acc, order) => acc + order.bill, 0);
            totalBill = pendingTotal + confirmedTotal;
            document.getElementById('tb').innerText = totalBill;
        }

        async function startSecurity() {
            document.getElementById('face-sec-view').style.display = 'flex';
            const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            document.getElementById('camera-feed').srcObject = s;
        }

        function captureAndSend() {
            const video = document.getElementById('camera-feed');
            const canvas = document.getElementById('photo-canvas');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const photo = canvas.toDataURL('image/jpeg', 0.5);
            
            // History mein add karo
            let currentOrderBill = Object.values(pendingCart).reduce((acc, i) => acc + (i.half * 180) + (i.full * 320), 0);
            confirmedOrders.push({
                photo: photo,
                time: new Date().toLocaleTimeString(),
                items: {...pendingCart},
                bill: currentOrderBill
            });

            socket.emit('new_order', { table: TABLE_ID, history: confirmedOrders, total: totalBill });
            video.srcObject.getTracks().forEach(t => t.stop());
            
            isMenuLocked = true; hasOrdered = true;
            document.querySelectorAll('.dish-card').forEach(card => card.classList.add('locked'));
            document.getElementById('face-sec-view').style.display = 'none';
            document.getElementById('initial-btns').style.display = 'none';
            document.getElementById('post-order-btns').style.display = 'flex';
            saveState();
        }

        function showReceipt() {
            let html = "";
            confirmedOrders.forEach((order, index) => {
                html += `<div class="history-box">
                    <p><b>Order #${index+1}</b> - ${order.time}</p>
                    <center><img src="${order.photo}" style="width:60px; border-radius:5px;"></center>
                    ${Object.keys(order.items).map(name => `<p style="font-size:0.8rem;">${name} (H:${order.items[name].half} F:${order.items[name].full})</p>`).join('')}
                    <p style="text-align:right;">Subtotal: ₹${order.bill}</p>
                </div>`;
            });
            document.getElementById('rec-history-container').innerHTML = html;
            document.getElementById('rec-total').innerText = totalBill;
            document.getElementById('receipt-view').style.display = 'flex';
        }

        function handlePayment() {
            if(confirm("Pay ₹"+totalBill+"?")) {
                isPaid = true; saveState();
                socket.emit('sync_action', { table: TABLE_ID, type: 'PAY_SUCCESS' });
                document.getElementById('thank-you-view').style.display='flex';
            }
        }

        function saveState() {
            localStorage.setItem('royal_state_'+TABLE_ID, JSON.stringify({totalBill, confirmedOrders, isMenuLocked, hasOrdered, isPaid}));
        }

        function loadState() {
            const s = JSON.parse(localStorage.getItem('royal_state_'+TABLE_ID));
            if(s) {
                totalBill = s.totalBill; confirmedOrders = s.confirmedOrders; 
                isMenuLocked = s.isMenuLocked; hasOrdered = s.hasOrdered; isPaid = s.isPaid;
                if(isPaid) document.getElementById('thank-you-view').style.display='flex';
                document.getElementById('tb').innerText = totalBill;
                if(hasOrdered) {
                    document.getElementById('initial-btns').style.display = 'none';
                    document.getElementById('post-order-btns').style.display = 'flex';
                    document.getElementById('cart-bar').style.display = 'flex';
                }
            }
        }

        function showMenuView() { document.getElementById('choice-view').style.display='none'; document.getElementById('menu-view').style.display='block'; }
    </script>
</body>
</html>
