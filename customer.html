<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap');
        :root { --gold: #c5a059; --glass: rgba(0, 0, 0, 0.9); --border: rgba(255, 255, 255, 0.1); }
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Poppins', sans-serif; color: #fff; background: #000; overflow-x: hidden; }
        .view { position: fixed; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; background: #000; z-index: 500; }
        #choice-view { display: flex; z-index: 1000; }
        .choice-card { background: rgba(255,255,255,0.03); border: 1px solid var(--border); padding: 30px; border-radius: 35px; width: 80%; max-width: 400px; margin-bottom: 20px; text-align: center;}
        #menu-view { display: none; padding: 20px; min-height: 100vh; background: #050505; position: relative; z-index: 600; }
        .dish-card { background: var(--glass); border: 1px solid var(--border); margin-bottom: 15px; padding: 18px; border-radius: 28px; display: flex; align-items: center; }
        .dish-img { width: 70px; height: 70px; border-radius: 15px; margin-right: 15px; object-fit: cover; }
        .modal-box { width: 85%; background: #111; padding: 30px 20px; border-radius: 40px; border: 1px solid var(--gold); text-align: center; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); display: none; z-index: 2000; }
        .qty-btn { background: none; border: 1px solid var(--gold); color: var(--gold); width: 35px; height: 35px; border-radius: 50%; }
        .cart-bar { position: fixed; bottom: 20px; left: 15px; right: 15px; background: var(--gold); color: #000; padding: 20px; border-radius: 25px; display: none; justify-content: space-between; font-weight: 800; z-index: 1500; }
    </style>
</head>
<body>

    <div id="table-tag" style="position:fixed; top:15px; left:15px; z-index:3000; background:var(--gold); color:#000; padding:5px 15px; border-radius:20px; font-weight:800; font-size:0.7rem;">TABLE 01</div>

    <div id="choice-view" class="view">
        <h2 style="color:var(--gold);">THE ROYAL KITCHEN</h2>
        <div class="choice-card">
            <img id="qr-img" src="" style="border: 5px solid #fff; border-radius: 12px; width: 150px;">
            <p style="font-size: 0.8rem; margin-top: 10px;">Scan to Order from Mobile</p>
        </div>
        <div class="choice-card" onclick="startFlow()" style="cursor:pointer; border: 1.5px solid var(--gold);">
            <h3>Open Tablet Menu</h3>
        </div>
    </div>

    <div id="menu-view">
        <h2 style="margin-top: 40px; font-weight: 800;">Our Menu</h2>
        <div class="dish-card" onclick="openItem('Paneer Tikka', 180, 320)">
            <img src="https://images.unsplash.com/photo-1567188040759-fb8a883dc6d8?w=200" class="dish-img">
            <div><h3>Paneer Tikka</h3><small style="color:var(--gold)">H: 180 | F: 320</small></div>
        </div>
    </div>

    <div id="item-modal" class="modal-box">
        <h2 id="modal-item-name" style="color:var(--gold);">Item</h2>
        <div style="display:flex; justify-content:space-around; margin: 20px 0;">
             <div>Half <br> <button class="qty-btn" onclick="updateQty('half', -1)">-</button> <span id="hc">0</span> <button class="qty-btn" onclick="updateQty('half', 1)">+</button></div>
             <div>Full <br> <button class="qty-btn" onclick="updateQty('full', -1)">-</button> <span id="fc">0</span> <button class="qty-btn" onclick="updateQty('full', 1)">+</button></div>
        </div>
        <h3>Total: ₹<span id="mt">0</span></h3>
        <button onclick="addToCart()" style="width:100%; background:var(--gold); padding:15px; border-radius:15px; border:none; font-weight:800;">ADD TO ORDER</button>
        <p onclick="closeModal()" style="opacity:0.5; margin-top:10px; cursor:pointer;">Cancel</p>
    </div>

    <div class="cart-bar" id="cart-bar">
        <span>Bill: ₹<span id="tb">0</span></span>
        <button onclick="sendOrder()" style="background:#000; color:#fff; border:none; padding:8px 20px; border-radius:12px;">SEND ORDER</button>
    </div>

    <script>
        const CLOUD_URL = "https://royal-kitchen.onrender.com"; 
        const TABLE_ID = "01"; 
        const socket = io(CLOUD_URL);

        // QR Setup with "Force Reload" Versioning
        const myUrl = window.location.href.split('?')[0];
        document.getElementById('qr-img').src = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${myUrl}?table=${TABLE_ID}&v=1.1`;

        // Check URL on Load
        function checkScan() {
            const params = new URLSearchParams(window.location.search);
            if (params.get('table') === TABLE_ID) {
                console.log("Scan Detected!");
                socket.emit('mobile_scanned', TABLE_ID);
                startFlow();
            }
        }
        window.onload = checkScan;

        function startFlow() {
            document.getElementById('choice-view').style.display = 'none';
            document.getElementById('menu-view').style.display = 'block';
            socket.emit('join_table', TABLE_ID);
        }

        let totalBill = 0, currentItem = {}, counts = {half:0, full:0};
        function openItem(name, hp, fp) {
            currentItem = {name, hp, fp}; counts = {half:0, full:0};
            document.getElementById('modal-item-name').innerText = name;
            document.getElementById('hc').innerText = 0; document.getElementById('fc').innerText = 0;
            document.getElementById('mt').innerText = 0;
            document.getElementById('item-modal').style.display = 'block';
        }
        function updateQty(t, v) { counts[t] = Math.max(0, counts[t]+v); updateDisplay(); }
        function updateDisplay() {
            document.getElementById('hc').innerText = counts.half;
            document.getElementById('fc').innerText = counts.full;
            document.getElementById('mt').innerText = (counts.half*currentItem.hp) + (counts.full*currentItem.fp);
        }
        function addToCart() {
            let val = parseInt(document.getElementById('mt').innerText);
            if(val > 0) {
                totalBill += val;
                document.getElementById('tb').innerText = totalBill;
                document.getElementById('cart-bar').style.display = 'flex';
                socket.emit('sync_cart', { table: TABLE_ID, bill: totalBill });
                closeModal();
            }
        }
        function closeModal() { document.getElementById('item-modal').style.display = 'none'; }
        function sendOrder() { socket.emit('new_order', { table: TABLE_ID, total: totalBill }); alert("Order Sent!"); }

        socket.on('update_client_view', (data) => {
            if(data.table === TABLE_ID) {
                totalBill = data.bill;
                document.getElementById('tb').innerText = totalBill;
                document.getElementById('cart-bar').style.display = 'flex';
                startFlow(); 
            }
        });
        socket.on('mobile_connected', (data) => { if(data.table === TABLE_ID) startFlow(); });
    </script>
</body>
</html>
