<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap');
        :root { --gold: #c5a059; --glass: rgba(255, 255, 255, 0.05); --border: rgba(255, 255, 255, 0.1); }
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Poppins', sans-serif; color: #fff; background: #000; overflow-x: hidden; }
        
        /* Centered Grid Layout */
        #menu-view { display: none; padding: 15px; min-height: 100vh; background: #050505; padding-top: 70px; padding-bottom: 120px; }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; max-width: 500px; margin: 0 auto; }
        
        .dish-card { 
            background: var(--glass); 
            border: 1px solid var(--border); 
            border-radius: 20px; 
            padding: 12px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            text-align: center; 
            cursor: pointer; 
            transition: transform 0.2s; 
        }
        .dish-card:active { transform: scale(0.95); }
        .dish-card.locked { opacity: 0.5; cursor: not-allowed; pointer-events: none; }
        .dish-card.hidden { display: none !important; } /* Focus mode support */
        
        .dish-img { 
            width: 100%; 
            aspect-ratio: 1/1; 
            border-radius: 15px; 
            margin-bottom: 10px; 
            object-fit: cover; 
            border: 1px solid rgba(197, 160, 89, 0.3); 
        }
        
        .dish-info h3 { margin: 5px 0; font-size: 0.95rem; font-weight: 600; color: #fff; }
        .dish-info small { color: var(--gold); font-size: 0.75rem; font-weight: 400; }

        /* Views & Modals */
        .view { position: fixed; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; background: #000; z-index: 500; text-align: center; }
        #choice-view { display: flex; z-index: 1000; }
        .modal-box { width: 85%; max-width: 400px; background: #111; padding: 30px 20px; border-radius: 40px; border: 1px solid var(--gold); text-align: center; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); display: none; z-index: 2000; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        .qty-btn { background: none; border: 1px solid var(--gold); color: var(--gold); width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-weight: bold; }
        
        /* Sticky Cart Bar */
        .cart-bar { position: fixed; bottom: 20px; left: 15px; right: 15px; background: var(--gold); color: #000; padding: 15px; border-radius: 25px; display: none; flex-direction: column; align-items: center; font-weight: 800; z-index: 1500; box-shadow: 0 10px 30px rgba(197, 160, 89, 0.3); }
        .btn-group { display: flex; gap: 8px; width: 100%; margin-top: 10px; }
        .action-btn { flex: 1; padding: 12px 5px; border-radius: 12px; border: none; font-weight: bold; font-size: 0.75rem; text-transform: uppercase; }
        
        #receipt-view { z-index: 6000; background: rgba(0,0,0,0.95); display: none; overflow-y: auto; padding: 20px 0; }
        .receipt-card { background: #fff; color: #000; width: 88%; border-radius: 20px; padding: 20px; text-align: left; margin: auto; }
        .history-item { border-bottom: 1px solid #eee; margin-bottom: 10px; padding-bottom: 5px; }
        #thank-you-view { z-index: 7000; background: #000; display: none; }
        #face-sec-view { z-index: 3000; background: #000; }
        .tablet-hide-controls .qty-btn, .tablet-hide-controls #add-btn, .tablet-hide-controls .btn-group { display: none !important; }
    </style>
</head>
<body>

    <div id="choice-view" class="view">
        <h2 style="color:var(--gold); letter-spacing: 2px;">THE ROYAL KITCHEN</h2>
        <div style="background:rgba(255,255,255,0.03); padding:30px; border-radius:35px; border:1px solid var(--border);">
            <img id="qr-img" src="" style="width: 150px; border: 5px solid #fff; border-radius: 10px;">
        </div>
        <p style="margin-top:20px; opacity:0.6;">Scan to start your experience</p>
    </div>

    <div id="menu-view">
        <h2 id="menu-title" style="font-weight: 800; margin-bottom: 20px; text-align: center;">Explore Menu</h2>
        <div class="menu-grid" id="main-grid">
            <div class="dish-card" onclick="triggerItem('Paneer Tikka', 180, 320)">
                <img src="https://images.unsplash.com/photo-1567188040759-fb8a883dc6d8?w=300" class="dish-img">
                <div class="dish-info">
                    <h3>Paneer Tikka</h3>
                    <small>Starts @ ₹180</small>
                </div>
            </div>
            <div class="dish-card" onclick="triggerItem('Chicken Masala', 220, 400)">
                <img src="https://images.unsplash.com/photo-1603894527177-9426f04d9c8c?w=300" class="dish-img">
                <div class="dish-info">
                    <h3>Chicken Masala</h3>
                    <small>Starts @ ₹220</small>
                </div>
            </div>
            <div class="dish-card" onclick="triggerItem('Butter Naan', 40, 70)">
                <img src="https://images.unsplash.com/photo-1533777857889-4be7c70b33f7?w=300" class="dish-img">
                <div class="dish-info">
                    <h3>Butter Naan</h3>
                    <small>Starts @ ₹40</small>
                </div>
            </div>
            <div class="dish-card" onclick="triggerItem('Dal Tadka', 120, 200)">
                <img src="https://images.unsplash.com/photo-1546833999-b9f581a1996d?w=300" class="dish-img">
                <div class="dish-info">
                    <h3>Dal Tadka</h3>
                    <small>Starts @ ₹120</small>
                </div>
            </div>
        </div>
    </div>

    <div id="item-modal" class="modal-box">
        <h2 id="modal-item-name" style="color:var(--gold);">Item</h2>
        <p id="modal-prices" style="font-size: 0.8rem; margin-bottom: 10px; opacity: 0.7;"></p>
        <div style="display:flex; justify-content:space-around; margin: 20px 0;">
             <div>Half <br><br> <button class="qty-btn" onclick="triggerQty('half', -1)">-</button> <span id="hc" style="font-size:1.2rem; margin:0 10px;">0</span> <button class="qty-btn" onclick="triggerQty('half', 1)">+</button></div>
             <div>Full <br><br> <button class="qty-btn" onclick="triggerQty('full', -1)">-</button> <span id="fc" style="font-size:1.2rem; margin:0 10px;">0</span> <button class="qty-btn" onclick="triggerQty('full', 1)">+</button></div>
        </div>
        <h3>Selection: ₹<span id="mt">0</span></h3>
        <p style="font-size: 0.7rem; color: var(--gold); opacity: 0.8;" id="prev-order-hint"></p>
        <button id="add-btn" onclick="triggerAdd()" style="width:100%; background:var(--gold); padding:15px; border-radius:15px; border:none; font-weight:800;">CONFIRM SELECTION</button>
        <button onclick="cancelSelection()" style="background:none; border:none; color:#ff4444; margin-top:15px; font-weight:bold; cursor:pointer;">CANCEL</button>
    </div>

    <div id="receipt-view" class="view">
        <div class="receipt-card">
            <h3 style="text-align:center; border-bottom: 2px dashed #000; padding-bottom: 10px;">BILL HISTORY</h3>
            <div id="rec-history-content"></div>
            <h3 style="border-top: 2px dashed #000; padding-top: 10px; text-align: right;">Final Bill: ₹<span id="rec-grand-total">0</span></h3>
            <button onclick="triggerCloseReceipt()" style="width:100%; margin-top:15px; background:#000; color:#fff; border:none; padding:12px; border-radius:10px; font-weight:bold;">BACK TO MENU</button>
        </div>
    </div>

    <div id="thank-you-view" class="view">
        <h1 style="color:var(--gold); font-size: 4rem;">🙏</h1>
        <h2>THANK YOU!</h2>
        <p>Payment Received.</p>
    </div>

    <div class="cart-bar" id="cart-bar">
        <span>Total Bill: ₹<span id="tb">0</span></span>
        <div id="initial-btns" class="btn-group">
            <button class="action-btn" onclick="startSecurity()" style="background:#000; color:#fff; width:100%;">SEND ORDER</button>
        </div>
        <div id="post-order-btns" class="btn-group" style="display:none;">
            <button class="action-btn" onclick="unlockMenu()" style="background:#fff; color:#000;">+ ADD MORE</button>
            <button class="action-btn" onclick="triggerShowReceipt()" style="background:var(--gold); color:#000;">HISTORY</button>
            <button class="action-btn" onclick="handlePayment()" style="background:#000; color:#fff;">PAY NOW</button>
        </div>
    </div>

    <div id="face-sec-view" class="view">
        <video id="camera-feed" autoplay playsinline style="width:250px; height:250px; border-radius:50%; object-fit:cover; border:4px solid var(--gold);"></video>
        <canvas id="photo-canvas" style="display:none;"></canvas>
        <button onclick="captureAndSend()" style="background:var(--gold); color:#000; padding:15px 40px; border-radius:50px; border:none; font-weight:800; margin-top:20px;">CONFIRM ORDER</button>
    </div>

    <script>
        const CLOUD_URL = "https://royal-kitchen.onrender.com"; 
        const TABLE_ID = "01"; 
        const socket = io(CLOUD_URL);
        let isMobile = false, currentBill = 0, grandTotal = 0, currentItem = {}, counts = {half:0, full:0}, hasOrdered = false;
        let cart = {}, orderHistory = []; 

        const myUrl = window.location.href.split('?')[0];
        document.getElementById('qr-img').src = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${myUrl}?table=${TABLE_ID}`;

        // --- NEW: SCROLL SYNC LOGIC ---
        window.addEventListener('scroll', () => {
            if(isMobile) {
                const scrollPercent = window.scrollY / (document.documentElement.scrollHeight - window.innerHeight);
                socket.emit('sync_action', { table: TABLE_ID, type: 'SCROLL', data: { percent: scrollPercent } });
            }
        });

        socket.on('connect', () => {
            socket.emit('join_table', TABLE_ID);
            const params = new URLSearchParams(window.location.search);
            if (params.has('table')) {
                isMobile = true;
                const saved = localStorage.getItem('royal_table_' + TABLE_ID);
                let savedData = saved ? JSON.parse(saved) : null;
                if (savedData && savedData.isPaid && window.performance.navigation.type !== 1) {
                    localStorage.removeItem('royal_table_' + TABLE_ID);
                    savedData = null;
                }
                if (savedData && savedData.isPaid) {
                    showThankYou(false);
                } else {
                    socket.emit('sync_action', { table: TABLE_ID, type: 'FORCE_START' });
                    showMenuView();
                    loadState();
                }
            } else {
                document.body.classList.add('tablet-hide-controls');
            }
        });

        function triggerShowReceipt() {
            if(!isMobile) return;
            socket.emit('sync_action', { table: TABLE_ID, type: 'OPEN_RECEIPT', data: { history: orderHistory, grand: grandTotal } });
            showReceipt();
        }

        function showReceipt() {
            let historyHtml = "";
            orderHistory.forEach((order, index) => {
                historyHtml += `<div class="history-item">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <img src="${order.photo}" style="width:50px; height:50px; border-radius:5px; border:1px solid #000;">
                        <span style="font-size:0.7rem;">Order #${index+1} - ${order.time}</span>
                    </div>
                    <div style="margin-top:5px;">`;
                for(let name in order.items) {
                    historyHtml += `<p style="margin:2px 0; font-size:0.85rem;">${name}: H:${order.items[name].half} | F:${order.items[name].full}</p>`;
                }
                historyHtml += `</div><p style="text-align:right; font-weight:bold;">₹${order.total}</p></div>`;
            });
            document.getElementById('rec-history-content').innerHTML = historyHtml;
            document.getElementById('rec-grand-total').innerText = grandTotal;
            document.getElementById('receipt-view').style.display = 'flex';
        }

        function triggerCloseReceipt() {
            if(isMobile) socket.emit('sync_action', { table: TABLE_ID, type: 'CLOSE_RECEIPT' });
            document.getElementById('receipt-view').style.display = 'none';
        }

        function unlockMenu() {
            cart = {}; currentBill = 0;
            document.getElementById('tb').innerText = grandTotal;
            document.querySelectorAll('.dish-card').forEach(card => card.classList.remove('locked', 'hidden'));
            document.getElementById('menu-title').innerText = "Explore Menu";
            document.getElementById('item-modal').style.display = 'none';
            document.getElementById('cart-bar').style.display = 'flex';
            document.getElementById('initial-btns').style.display = 'flex';
            document.getElementById('post-order-btns').style.display = 'none';
            if(isMobile) socket.emit('sync_action', { table: TABLE_ID, type: 'RESET_SELECTION', data: { grand: grandTotal } });
            saveState();
        }

        function triggerItem(n, h, f) {
            if(!isMobile || hasOrdered) return;
            // Focus Mode Logic
            const cards = document.querySelectorAll('.dish-card');
            cards.forEach(card => { if(!card.innerHTML.includes(n)) card.classList.add('hidden'); });
            document.getElementById('menu-title').innerText = "Confirm Selection";

            socket.emit('sync_action', { table: TABLE_ID, type: 'OPEN_MODAL', data: {n, h, f} });
            openItem(n, h, f);
        }

        function openItem(name, hp, fp) {
            currentItem = {name, hp, fp};
            counts = cart[name] ? {...cart[name]} : {half:0, full:0};
            
            let prevQtyText = "";
            let prevHalf = 0, prevFull = 0;
            orderHistory.forEach(order => {
                if(order.items[name]) {
                    prevHalf += order.items[name].half;
                    prevFull += order.items[name].full;
                }
            });
            if(prevHalf > 0 || prevFull > 0) prevQtyText = `Previously Ordered: H: ${prevHalf}, F: ${prevFull}`;

            document.getElementById('modal-item-name').innerText = name;
            document.getElementById('modal-prices').innerText = `H: ₹${hp} | F: ₹${fp}`;
            document.getElementById('hc').innerText = counts.half;
            document.getElementById('fc').innerText = counts.full;
            document.getElementById('prev-order-hint').innerText = prevQtyText;
            updateModalBill();
            document.getElementById('item-modal').style.display = 'block';
            document.getElementById('cart-bar').style.display = 'none';
        }

        function cancelSelection() {
            document.querySelectorAll('.dish-card').forEach(card => card.classList.remove('hidden'));
            document.getElementById('menu-title').innerText = "Explore Menu";
            document.getElementById('item-modal').style.display = 'none';
            if(grandTotal > 0 || currentBill > 0) document.getElementById('cart-bar').style.display = 'flex';
            if(isMobile) socket.emit('sync_action', { table: TABLE_ID, type: 'CANCEL_SELECT' });
        }

        function triggerQty(t, v) {
            socket.emit('sync_action', { table: TABLE_ID, type: 'UPDATE_QTY', data: {t, v, hp: currentItem.hp, fp: currentItem.fp} });
            updateQty(t, v, currentItem.hp, currentItem.fp);
        }

        function updateQty(t, v, hp, fp) {
            counts[t] = Math.max(0, counts[t]+v);
            document.getElementById(t==='half'?'hc':'fc').innerText = counts[t];
            updateModalBill();
        }

        function updateModalBill() {
            let itemTotal = (counts.half * currentItem.hp) + (counts.full * currentItem.fp);
            document.getElementById('mt').innerText = itemTotal; 
        }

        function triggerAdd() {
            socket.emit('sync_action', { table: TABLE_ID, type: 'ADD_CART' });
            addToCart();
        }

        function addToCart() {
            cart[currentItem.name] = {...counts};
            let newSelectionTotal = Object.keys(cart).reduce((acc, name) => {
                let hPrice = (name === 'Paneer Tikka') ? 180 : (name === 'Chicken Masala' ? 220 : (name === 'Butter Naan' ? 40 : 120));
                let fPrice = (name === 'Paneer Tikka') ? 320 : (name === 'Chicken Masala' ? 400 : (name === 'Butter Naan' ? 70 : 200));
                return acc + (cart[name].half * hPrice) + (cart[name].full * fPrice);
            }, 0);
            
            currentBill = newSelectionTotal;
            document.getElementById('tb').innerText = grandTotal + currentBill;
            document.getElementById('cart-bar').style.display = 'flex';
            document.getElementById('item-modal').style.display = 'none';
            // Restore menu cards
            document.querySelectorAll('.dish-card').forEach(card => card.classList.remove('hidden'));
            document.getElementById('menu-title').innerText = "Explore Menu";
            saveState();
        }

        async function startSecurity() {
            if(currentBill <= 0) return alert("Select new items!");
            document.getElementById('face-sec-view').style.display = 'flex';
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            document.getElementById('camera-feed').srcObject = stream;
        }

        function captureAndSend() {
            const video = document.getElementById('camera-feed');
            const canvas = document.getElementById('photo-canvas');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const photo = canvas.toDataURL('image/jpeg', 0.5);
            const time = new Date().toLocaleTimeString();
            
            const newOrder = { total: currentBill, photo, items: {...cart}, time };
            orderHistory.push(newOrder);
            recalculateGrandTotal();
            
            socket.emit('new_order', { table: TABLE_ID, order: newOrder, grandTotal });
            video.srcObject.getTracks().forEach(t => t.stop());
            
            hasOrdered = true; currentBill = 0; cart = {};
            document.querySelectorAll('.dish-card').forEach(card => card.classList.add('locked'));
            document.getElementById('face-sec-view').style.display = 'none';
            document.getElementById('initial-btns').style.display = 'none';
            document.getElementById('post-order-btns').style.display = 'flex';
            document.getElementById('cart-bar').style.display = 'flex';
            document.getElementById('tb').innerText = grandTotal;
            saveState();
        }

        function recalculateGrandTotal() {
            grandTotal = orderHistory.reduce((acc, order) => acc + order.total, 0);
        }

        function handlePayment() {
            if(confirm("Confirm Final Payment of ₹" + grandTotal + "?")) {
                socket.emit('sync_action', { table: TABLE_ID, type: 'PAY_SUCCESS' });
                localStorage.setItem('royal_table_' + TABLE_ID, JSON.stringify({ isPaid: true }));
                showThankYou(true);
            }
        }

        function saveState() {
            if(!isMobile) return;
            localStorage.setItem('royal_table_' + TABLE_ID, JSON.stringify({ grandTotal, hasOrdered, orderHistory, cart, currentBill }));
        }

        function loadState() {
            const saved = localStorage.getItem('royal_table_' + TABLE_ID);
            if(saved) {
                const data = JSON.parse(saved);
                orderHistory = data.orderHistory || [];
                recalculateGrandTotal();
                currentBill = data.currentBill || 0;
                cart = data.cart || {};
                hasOrdered = data.hasOrdered || false;
                if(hasOrdered) {
                    document.querySelectorAll('.dish-card').forEach(card => card.classList.add('locked'));
                    document.getElementById('initial-btns').style.display = 'none';
                    document.getElementById('post-order-btns').style.display = 'flex';
                }
                document.getElementById('tb').innerText = grandTotal + currentBill;
                if(grandTotal > 0 || currentBill > 0) document.getElementById('cart-bar').style.display = 'flex';
            }
        }

        function showThankYou(shouldDisconnect) {
            document.getElementById('menu-view').style.display = 'none';
            document.getElementById('cart-bar').style.display = 'none';
            document.getElementById('thank-you-view').style.display = 'flex';
            if(shouldDisconnect) setTimeout(() => { socket.disconnect(); }, 1500);
        }

        function showMenuView() {
            document.getElementById('choice-view').style.display = 'none';
            document.getElementById('menu-view').style.display = 'block';
        }

        socket.on('sync_action', (p) => {
            if(p.table !== TABLE_ID) return;

            // HANDLE SCROLL SYNC
            if(p.type === 'SCROLL' && !isMobile) {
                const targetScroll = p.data.percent * (document.documentElement.scrollHeight - window.innerHeight);
                window.scrollTo({ top: targetScroll, behavior: 'smooth' });
            }

            if(p.type === 'FORCE_START') showMenuView();
            if(p.type === 'OPEN_MODAL') {
                // Focus mode sync for laptop
                document.querySelectorAll('.dish-card').forEach(card => { if(!card.innerHTML.includes(p.data.n)) card.classList.add('hidden'); });
                openItem(p.data.n, p.data.h, p.data.f);
            }
            if(p.type === 'UPDATE_QTY') updateQty(p.data.t, p.data.v, p.data.hp, p.data.fp);
            if(p.type === 'ADD_CART') addToCart();
            if(p.type === 'CANCEL_SELECT') {
                document.querySelectorAll('.dish-card').forEach(card => card.classList.remove('hidden'));
                document.getElementById('item-modal').style.display = 'none';
            }
            if(p.type === 'RESET_SELECTION') { 
                cart = {}; currentBill = 0; 
                grandTotal = p.data.grand || 0;
                document.getElementById('tb').innerText = grandTotal; 
                document.getElementById('item-modal').style.display = 'none';
                document.querySelectorAll('.dish-card').forEach(card => card.classList.remove('locked', 'hidden'));
                document.getElementById('menu-title').innerText = "Explore Menu";
            }
            if(p.type === 'OPEN_RECEIPT') { orderHistory = p.data.history; grandTotal = p.data.grand; showReceipt(); }
            if(p.type === 'CLOSE_RECEIPT') document.getElementById('receipt-view').style.display = 'none';
            if(p.type === 'PAY_SUCCESS' && !isMobile) location.reload();
        });
    </script>
</body>
</html>
