<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap');
        :root { --gold: #c5a059; --glass: rgba(255, 255, 255, 0.05); --border: rgba(255, 255, 255, 0.1); }
        
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            font-family: 'Poppins', sans-serif; color: #fff; 
            background: #000; overflow: hidden; 
        }

        /* 1. Header Styling */
        .menu-header {
            position: fixed;
            top: 0; left: 0; right: 0;
            text-align: center;
            padding: 25px 0;
            background: linear-gradient(to bottom, #000, transparent);
            z-index: 1200;
            display: none;
        }

        /* 2. Compact & Stylish Menu Portion */
        #menu-view { 
            display: none; 
            padding: 20px 10px; 
            height: 70vh; 
            /* Width ko control kiya taaki chaoda na lage */
            width: 92%;
            max-width: 400px; 
            margin: 90px auto 0 auto; 
            
            background: rgba(15, 15, 15, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 30px;
            
            overflow-y: auto; 
            box-sizing: border-box;
            -webkit-overflow-scrolling: touch; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        /* Custom Scrollbar for better UI */
        #menu-view::-webkit-scrollbar { width: 3px; }
        #menu-view::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }

        .menu-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 12px; 
            width: 100%; 
        }
        
        /* Updated Dish Card Design */
        .dish-card { 
            background: linear-gradient(145deg, rgba(255,255,255,0.05), rgba(255,255,255,0.01)); 
            border: 1px solid rgba(255,255,255,0.08); 
            border-radius: 22px; 
            padding: 10px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }
        .dish-card:active { transform: scale(0.96); background: rgba(197, 160, 89, 0.1); }
        .dish-card.locked { opacity: 0.4; filter: grayscale(1); }
        .dish-card.hidden { display: none !important; }
        
        .dish-img { 
            width: 100%; aspect-ratio: 1/1; 
            border-radius: 18px; margin-bottom: 8px; 
            object-fit: cover; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
        }
        .dish-info h3 { margin: 3px 0; font-size: 0.85rem; font-weight: 600; color: #f0f0f0; }
        .dish-info small { color: var(--gold); font-size: 0.7rem; font-weight: 500; letter-spacing: 0.5px; }

        /* Existing View & Modal Logic */
        .view { position: fixed; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; background: #000; z-index: 500; }
        #choice-view { display: flex; z-index: 1000; }
        .modal-box { width: 85%; max-width: 350px; background: #121212; padding: 25px; border-radius: 35px; border: 1px solid var(--gold); text-align: center; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); display: none; z-index: 2000; }
        .qty-btn { background: none; border: 1.5px solid var(--gold); color: var(--gold); width: 38px; height: 38px; border-radius: 50%; cursor: pointer; font-weight: bold; }
        
        /* Cart Bar Update */
        .cart-bar { position: fixed; bottom: 15px; left: 20px; right: 20px; background: var(--gold); color: #000; padding: 12px 20px; border-radius: 20px; display: none; flex-direction: column; align-items: center; font-weight: 800; z-index: 1500; box-shadow: 0 8px 25px rgba(197, 160, 89, 0.4); }
        .btn-group { display: flex; gap: 8px; width: 100%; margin-top: 8px; }
        .action-btn { flex: 1; padding: 10px; border-radius: 12px; border: none; font-weight: 700; font-size: 0.7rem; text-transform: uppercase; }

        #receipt-view { z-index: 6000; background: rgba(0,0,0,0.98); display: none; overflow-y: auto; padding: 20px 0; }
        .receipt-card { background: #fff; color: #000; width: 85%; border-radius: 25px; padding: 25px; text-align: left; margin: auto; }
        #face-sec-view { z-index: 3000; background: #000; }
        .tablet-hide-controls .qty-btn, .tablet-hide-controls #add-btn, .tablet-hide-controls .btn-group { display: none !important; }
    </style>
</head>
<body>

    <div id="choice-view" class="view">
        <h2 style="color:var(--gold); letter-spacing: 2px; font-weight: 800;">THE ROYAL KITCHEN</h2>
        <div style="background:rgba(255,255,255,0.03); padding:25px; border-radius:35px; border:1px solid var(--border);">
            <img id="qr-img" src="" style="width: 140px; border: 4px solid #fff; border-radius: 12px;">
        </div>
        <p style="margin-top:20px; opacity:0.5; font-size: 0.8rem;">Scan to start your experience</p>
    </div>

    <div class="menu-header" id="main-header">
        <h2 id="menu-title" style="margin: 0; color: var(--gold); font-size: 1.2rem; letter-spacing: 1.5px;">EXPLORE MENU</h2>
    </div>

    <div id="menu-view">
        <div class="menu-grid" id="main-grid">
            <div class="dish-card" onclick="triggerItem('Paneer Tikka', 180, 320)">
                <img src="https://images.unsplash.com/photo-1567188040759-fb8a883dc6d8?w=300" class="dish-img">
                <div class="dish-info"><h3>Paneer Tikka</h3><small>Starts @ ₹180</small></div>
            </div>
            <div class="dish-card" onclick="triggerItem('Chicken Masala', 220, 400)">
                <img src="https://images.unsplash.com/photo-1603894527177-9426f04d9c8c?w=300" class="dish-img">
                <div class="dish-info"><h3>Chicken Masala</h3><small>Starts @ ₹220</small></div>
            </div>
            <div class="dish-card" onclick="triggerItem('Butter Naan', 40, 70)">
                <img src="https://images.unsplash.com/photo-1533777857889-4be7c70b33f7?w=300" class="dish-img">
                <div class="dish-info"><h3>Butter Naan</h3><small>Starts @ ₹40</small></div>
            </div>
            <div class="dish-card" onclick="triggerItem('Dal Tadka', 120, 200)">
                <img src="https://images.unsplash.com/photo-1546833999-b9f581a1996d?w=300" class="dish-img">
                <div class="dish-info"><h3>Dal Tadka</h3><small>Starts @ ₹120</small></div>
            </div>
        </div>
    </div>

    <div id="item-modal" class="modal-box">
        <h2 id="modal-item-name" style="color:var(--gold); margin-bottom: 5px;">Item</h2>
        <p id="modal-prices" style="font-size: 0.75rem; margin-bottom: 15px; opacity: 0.6;"></p>
        <div style="display:flex; justify-content:space-around; margin-bottom: 20px;">
             <div>Half <br><br> <button class="qty-btn" onclick="triggerQty('half', -1)">-</button> <span id="hc" style="font-size:1.1rem; margin:0 8px;">0</span> <button class="qty-btn" onclick="triggerQty('half', 1)">+</button></div>
             <div>Full <br><br> <button class="qty-btn" onclick="triggerQty('full', -1)">-</button> <span id="fc" style="font-size:1.1rem; margin:0 8px;">0</span> <button class="qty-btn" onclick="triggerQty('full', 1)">+</button></div>
        </div>
        <h3 style="margin-bottom: 20px;">Selection: ₹<span id="mt">0</span></h3>
        <button id="add-btn" onclick="triggerAdd()" style="width:100%; background:var(--gold); padding:14px; border-radius:15px; border:none; font-weight:800; color: #000;">CONFIRM</button>
        <button onclick="cancelSelection()" style="background:none; border:none; color:#ff4444; margin-top:15px; font-weight:bold; cursor:pointer; font-size: 0.8rem;">CANCEL</button>
    </div>

    <div class="cart-bar" id="cart-bar">
        <span>Total Bill: ₹<span id="tb">0</span></span>
        <div id="initial-btns" class="btn-group">
            <button class="action-btn" onclick="startSecurity()" style="background:#000; color:#fff; width:100%;">SEND ORDER</button>
        </div>
        <div id="post-order-btns" class="btn-group" style="display:none;">
            <button class="action-btn" onclick="unlockMenu()" style="background:#fff; color:#000;">+ ADD</button>
            <button class="action-btn" onclick="triggerShowReceipt()" style="background:#000; color:#fff;">HISTORY</button>
            <button class="action-btn" onclick="handlePayment()" style="background:#000; color:var(--gold);">PAY</button>
        </div>
    </div>

    <script>
        // Logics remain same to keep it stable
        const CLOUD_URL = "https://royal-kitchen.onrender.com"; 
        const TABLE_ID = "01"; 
        const socket = io(CLOUD_URL);
        let isMobile = false, currentBill = 0, grandTotal = 0, currentItem = {}, counts = {half:0, full:0}, hasOrdered = false, cart = {}, orderHistory = []; 

        const menuView = document.getElementById('menu-view');
        document.getElementById('qr-img').src = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${window.location.href.split('?')[0]}?table=${TABLE_ID}`;

        menuView.addEventListener('scroll', () => {
            if(isMobile) {
                const scrollPercent = menuView.scrollTop / (menuView.scrollHeight - menuView.clientHeight);
                socket.emit('sync_action', { table: TABLE_ID, type: 'SCROLL', data: { percent: scrollPercent } });
            }
        });

        socket.on('connect', () => {
            socket.emit('join_table', TABLE_ID);
            const params = new URLSearchParams(window.location.search);
            if (params.has('table')) {
                isMobile = true;
                showMenuView();
                loadState();
            } else { document.body.classList.add('tablet-hide-controls'); }
        });

        // (Functions triggerItem, addToCart, startSecurity etc. carry on from previous version)
        function showMenuView() { 
            document.getElementById('choice-view').style.display = 'none'; 
            document.getElementById('main-header').style.display = 'block'; 
            document.getElementById('menu-view').style.display = 'block'; 
        }

        function triggerItem(n, h, f) {
            if(!isMobile || hasOrdered) return; 
            document.querySelectorAll('.dish-card').forEach(c => { if(!c.innerHTML.includes(n)) c.classList.add('hidden'); });
            document.getElementById('menu-title').innerText = "CONFIRM";
            openItem(n, h, f);
        }

        function openItem(n, hp, fp) {
            currentItem = {name:n, hp, fp}; counts = cart[n] ? {...cart[n]} : {half:0, full:0};
            document.getElementById('modal-item-name').innerText = n;
            document.getElementById('modal-prices').innerText = `H: ₹${hp} | F: ₹${fp}`;
            document.getElementById('hc').innerText = counts.half;
            document.getElementById('fc').innerText = counts.full;
            document.getElementById('mt').innerText = (counts.half * hp) + (counts.full * fp);
            document.getElementById('item-modal').style.display = 'block';
            document.getElementById('cart-bar').style.display = 'none';
        }

        function triggerQty(t, v) { counts[t] = Math.max(0, counts[t]+v); document.getElementById(t==='half'?'hc':'fc').innerText = counts[t]; document.getElementById('mt').innerText = (counts.half * currentItem.hp) + (counts.full * currentItem.fp); }

        function triggerAdd() {
            cart[currentItem.name] = {...counts};
            currentBill = Object.keys(cart).reduce((acc, name) => {
                let hp = (name === 'Paneer Tikka') ? 180 : (name === 'Chicken Masala' ? 220 : (name === 'Butter Naan' ? 40 : 120));
                let fp = (name === 'Paneer Tikka') ? 320 : (name === 'Chicken Masala' ? 400 : (name === 'Butter Naan' ? 70 : 200));
                return acc + (cart[name].half * hp) + (cart[name].full * fp);
            }, 0);
            document.getElementById('tb').innerText = grandTotal + currentBill;
            document.getElementById('cart-bar').style.display = 'flex';
            document.getElementById('item-modal').style.display = 'none';
            document.querySelectorAll('.dish-card').forEach(c => c.classList.remove('hidden'));
            document.getElementById('menu-title').innerText = "EXPLORE MENU";
            saveState();
        }

        function cancelSelection() {
            document.querySelectorAll('.dish-card').forEach(c => c.classList.remove('hidden'));
            document.getElementById('menu-title').innerText = "EXPLORE MENU";
            document.getElementById('item-modal').style.display = 'none';
            if(grandTotal > 0 || currentBill > 0) document.getElementById('cart-bar').style.display = 'flex';
        }

        function saveState() { if(isMobile) localStorage.setItem('royal_table_'+TABLE_ID, JSON.stringify({grandTotal, hasOrdered, cart, currentBill})); }
        function loadState() {
            const saved = JSON.parse(localStorage.getItem('royal_table_'+TABLE_ID) || "{}");
            if(saved.grandTotal !== undefined) {
                grandTotal = saved.grandTotal; currentBill = saved.currentBill || 0; hasOrdered = saved.hasOrdered || false;
                document.getElementById('tb').innerText = grandTotal + currentBill;
                if(grandTotal > 0 || currentBill > 0) document.getElementById('cart-bar').style.display = 'flex';
            }
        }
        // ... Socket sync logics remain the same ...
    </script>
</body>
</html>
