<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Royal Kitchen - Menu</title>
    <style>
        :root {
            --gold: #c5a059;
            --bg: #000000;
            --card-bg: rgba(255, 255, 255, 0.05);
            --border: rgba(197, 160, 89, 0.3);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Header Style */
        .menu-header {
            width: 100%;
            text-align: center;
            padding: 30px 0;
            background: var(--bg);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .menu-header h2 {
            margin: 0;
            color: var(--gold);
            letter-spacing: 2px;
            font-size: 1.5rem;
            text-transform: uppercase;
        }

        /* Main Portion - Ab ye utna hi chaoda hoga jitne items hain */
        #menu-view {
            margin: 10px auto;
            padding: 20px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            border-radius: 25px;
            
            /* Logic: Fit content aur max-width ka combo */
            width: fit-content; 
            max-width: 90vw;
            
            display: block;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Grid Layout */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 160px); /* Fixed width for alignment */
            gap: 15px;
            justify-content: center;
        }

        /* Item Card Design */
        .dish-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 10px;
            text-align: center;
            transition: transform 0.2s, border-color 0.2s;
            cursor: pointer;
        }

        .dish-card:hover {
            border-color: var(--gold);
            transform: translateY(-3px);
        }

        .dish-img {
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 15px;
            object-fit: cover;
            margin-bottom: 10px;
        }

        .dish-info h3 {
            margin: 5px 0;
            font-size: 0.95rem;
            color: #fff;
        }

        .dish-info small {
            color: var(--gold);
            font-size: 0.75rem;
            font-weight: bold;
        }

        /* Footer Style */
        .total-bill-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: var(--gold);
            color: black;
            text-align: center;
            padding: 15px 0;
            font-weight: bold;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <div class="menu-header">
        <h2>EXPLORE MENU</h2>
    </div>

    <div id="menu-view">
        <div class="menu-grid">
            
            <div class="dish-card">
                <img src="https://images.unsplash.com/photo-1567188040759-fb8a883dc6d8?w=300" class="dish-img" alt="Paneer Tikka">
                <div class="dish-info">
                    <h3>Paneer Tikka</h3>
                    <small>Starts @ ₹180</small>
                </div>
            </div>

            <div class="dish-card">
                <img src="https://images.unsplash.com/photo-1603894527177-9426f04d9c8c?w=300" class="dish-img" alt="Chicken Masala">
                <div class="dish-info">
                    <h3>Chicken Masala</h3>
                    <small>Starts @ ₹220</small>
                </div>
            </div>

            <div class="dish-card">
                <img src="https://images.unsplash.com/photo-1533777857889-4be7c70b33f7?w=300" class="dish-img" alt="Butter Naan">
                <div class="dish-info">
                    <h3>Butter Naan</h3>
                    <small>Starts @ ₹40</small>
                </div>
            </div>

            <div class="dish-card">
                <img src="https://images.unsplash.com/photo-1546833999-b9f581a1996d?w=300" class="dish-img" alt="Dal Tadka">
                <div class="dish-info">
                    <h3>Dal Tadka</h3>
                    <small>Starts @ ₹120</small>
                </div>
            </div>

        </div>
    </div>

    <div class="total-bill-bar">
        Total Bill: ₹0
    </div>

</body>
</html>
